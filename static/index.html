<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E8553D">
<title>嗨，这道菜</title>
<style>
:root{
  --bg:#FFF6EE;
  --bg-warm:#FCEBDD;
  --card:#FFFFFF;
  --tomato:#E8553D;
  --tomato-d:#CE412B;
  --caramel:#C57B43;
  --honey:#F4A93C;
  --ink:#3A2A22;
  --ink2:#9A8678;
  --ink3:#A88E7D;
  --line:#F1E4D7;
  --star:#F5A623;
  --tao:#FF5000;
  --shadow:0 14px 38px rgba(190,110,60,.13);
  --shadow-sm:0 6px 18px rgba(190,110,60,.09);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Helvetica Neue",sans-serif;
  color:var(--ink);
  background:var(--bg);
  background-image:
    radial-gradient(120% 60% at 50% -10%, var(--bg-warm) 0%, rgba(252,235,221,0) 60%);
  background-repeat:no-repeat;
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  padding:0 16px env(safe-area-inset-bottom);
}
.wrap{max-width:680px;margin:0 auto;padding:30px 0 60px}

/* ---------- Header ---------- */
.brand{text-align:center;margin:14px 0 26px}
.brand .logo{
  display:inline-flex;align-items:center;gap:10px;
  font-size:clamp(28px,7vw,38px);font-weight:800;letter-spacing:-.5px;color:var(--ink);
}
.brand .logo .em{font-size:1.05em;filter:drop-shadow(0 3px 5px rgba(232,85,61,.28))}
.brand .tag{margin-top:10px;color:var(--ink2);font-size:clamp(13px,3.6vw,15px)}
.brand .tag b{color:var(--tomato);font-weight:600}

/* ---------- Upload ---------- */
.panel{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);
  padding:18px;margin-bottom:20px;
}
.drop{
  border:2px dashed #E2BFA4;border-radius:14px;
  padding:38px 20px;text-align:center;cursor:pointer;
  transition:border-color .25s,background .25s,transform .25s;
  background:#FFFCF9;
}
.drop:hover{border-color:var(--tomato);background:#FFF6F2}
.drop.drag{border-color:var(--tomato);background:#FFF1EB;transform:scale(1.012)}
.drop .cam{font-size:46px;line-height:1;margin-bottom:14px;transition:transform .3s}
.drop:hover .cam{transform:translateY(-3px) rotate(-6deg)}
.drop .t1{font-size:clamp(16px,4.4vw,18px);font-weight:700;color:var(--ink)}
.drop .t2{font-size:13px;color:var(--ink3);margin-top:8px}
.drop .kbd{background:#F4ECE4;border-radius:6px;padding:1px 7px;font-weight:600;color:var(--caramel);font-size:12px}
#file{display:none}

.preview{margin-top:16px;display:none;text-align:center;position:relative}
.preview img{
  max-width:100%;max-height:360px;border-radius:14px;
  box-shadow:var(--shadow);border:5px solid #fff;
}
.preview .re{
  position:absolute;top:10px;right:10px;
  background:rgba(58,42,34,.62);color:#fff;border:none;
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;
  backdrop-filter:blur(4px);transition:background .2s;
}
.preview .re:hover{background:rgba(58,42,34,.85)}

.actions{text-align:center;margin-top:20px}
.btn{
  appearance:none;border:none;cursor:pointer;
  background:linear-gradient(180deg,var(--tomato),var(--tomato-d));
  color:#fff;font-size:17px;font-weight:700;font-family:inherit;
  padding:15px 42px;border-radius:50px;
  box-shadow:0 10px 22px rgba(232,85,61,.34);
  transition:transform .15s,box-shadow .2s,opacity .2s;
  display:inline-flex;align-items:center;gap:9px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(232,85,61,.42)}
.btn:active{transform:translateY(1px) scale(.99);box-shadow:0 6px 14px rgba(232,85,61,.3)}
.btn:disabled{background:#EBDFD3;color:#B19C8D;box-shadow:none;cursor:not-allowed;transform:none}

/* ---------- Results ---------- */
#result{display:none;margin-top:30px;animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
.sec-h{
  display:flex;align-items:center;gap:8px;
  font-size:15px;color:var(--ink2);font-weight:600;margin:0 4px 14px;
}
.sec-h::after{content:"";flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--line) 0 6px,transparent 6px 12px)}

/* hero food card */
.hero{
  background:var(--card);border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shadow);margin-bottom:26px;
}
.hero .pic{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:#F4ECE4}
.hero .body{padding:20px 22px 22px}
.hero .nm{font-size:clamp(24px,6.4vw,30px);font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.25}
.hero .en{font-size:13px;color:var(--ink3);margin-top:3px;font-style:italic;text-transform:capitalize}
.conf{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.stars{position:relative;display:inline-block;font-size:21px;line-height:1;letter-spacing:3px}
.stars::before{content:"★★★★★";color:#EFE2D6}
.stars .fill{position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap}
.stars .fill::before{content:"★★★★★";color:var(--star)}
.conf .lab{font-size:13.5px;font-weight:600;color:var(--caramel);background:#FCF0E4;padding:4px 12px;border-radius:20px}
.hero .intro{margin-top:14px;color:#6E5C50;font-size:15px;line-height:1.7;
  border-left:3px solid var(--honey);padding-left:13px}
.alts{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line)}
.alts .h{font-size:13px;color:var(--ink2);margin-bottom:9px}
.chip{
  display:inline-block;background:#F7EFE7;color:#8C7666;
  font-size:13px;padding:6px 13px;border-radius:30px;margin:0 8px 8px 0;font-weight:500;
}
.chip b{color:var(--caramel);font-weight:600;margin-left:4px}

/* recipe cards */
.rcard{
  background:var(--card);border-radius:14px;box-shadow:var(--shadow-sm);
  padding:18px 20px;margin-bottom:16px;border:1px solid transparent;
  transition:transform .25s,box-shadow .25s,border-color .25s;
}
.rcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#F3DEC9}
.rtop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.rtitle{font-size:18px;font-weight:700;color:var(--ink);margin:0;line-height:1.35}
.rmatch{flex-shrink:0;font-size:12px;color:var(--caramel);background:#FBF1E6;
  padding:5px 11px;border-radius:30px;font-weight:600;white-space:nowrap}
.rbar{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap}
.link-btn{
  background:none;border:none;cursor:pointer;font-family:inherit;
  color:var(--tomato);font-weight:700;font-size:14px;padding:0;
  display:inline-flex;align-items:center;gap:6px;transition:opacity .2s;
}
.link-btn:hover{opacity:.7}
.link-btn .ar{transition:transform .3s}
.link-btn.open .ar{transform:rotate(180deg)}
.cn-btn{color:var(--caramel)}
.rbody{display:none;margin-top:16px;padding-top:16px;border-top:1px dashed var(--line);animation:fade .35s}
.blk-h{font-size:14px;font-weight:700;color:var(--ink);margin:14px 0 8px;display:flex;align-items:center;gap:7px}
.blk-h:first-child{margin-top:0}
.ing,.dir{padding-left:4px;margin:0;font-size:14.5px;line-height:1.85;color:#6E5C50;list-style:none}
.ing li,.dir li{position:relative;padding-left:22px;margin-bottom:4px}
.ing li::before{content:"·";position:absolute;left:8px;color:var(--honey);font-weight:800;font-size:20px;line-height:1}
.dir{counter-reset:step}
.dir li{counter-increment:step}
.dir li::before{content:counter(step);position:absolute;left:0;top:2px;width:17px;height:17px;
  background:#FBE7D3;color:var(--caramel);border-radius:50%;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;line-height:1}
.tao{
  color:var(--tao);text-decoration:none;border-bottom:1px dashed rgba(255,80,0,.5);
  transition:background .2s,border-color .2s;
}
.tao:hover{background:#FFF0E8;border-bottom-color:var(--tao)}
.empty{text-align:center;color:var(--ink3);padding:24px;font-size:15px}

/* ---------- Skeleton ---------- */
#skel{display:none;margin-top:30px}
.sk{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:16px}
.sk .pic{width:100%;aspect-ratio:16/10}
.sk .ln{height:14px;border-radius:7px;margin:14px 22px}
.sk .ln.w1{width:45%;height:24px}
.sk .ln.w2{width:70%}
.sk .ln.w3{width:88%}
.shimmer{background:linear-gradient(100deg,#F3EAE1 30%,#FBF4ED 50%,#F3EAE1 70%);
  background-size:200% 100%;animation:sh 1.3s infinite linear}

/* ---------- footer ---------- */
.foot{text-align:center;color:var(--ink3);font-size:12px;margin-top:40px;line-height:1.8}

@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}

@media(min-width:560px){
  .wrap{padding:44px 0 70px}
  .drop{padding:48px 30px}
  .panel{padding:22px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header class="brand">
    <div class="logo"><span class="em">🍜</span><span>嗨，这道菜</span></div>
    <div class="tag">拍一拍 / 拖张图进来，<b>一拍就知道叫什么</b>，还顺手送你做法 🥢</div>
  </header>

  <section class="panel">
    <div class="drop" id="drop">
      <div class="cam">📷</div>
      <div class="t1">点这里、拖张图、或 <span class="kbd">Ctrl+V</span> 贴一张</div>
      <div class="t2">支持 JPG / PNG，越清晰越认得准</div>
      <input type="file" id="file" accept="image/*">
    </div>

    <div class="preview" id="preview">
      <img id="pimg" src="" alt="你上传的图">
      <button class="re" id="reset" title="换一张">✕</button>
    </div>

    <div class="actions">
      <button class="btn" id="go" disabled>认一认 👀</button>
    </div>
  </section>

  <!-- skeleton while thinking -->
  <div id="skel" aria-hidden="true">
    <div class="sk">
      <div class="pic shimmer"></div>
      <div class="ln w1 shimmer"></div>
      <div class="ln w2 shimmer"></div>
      <div class="ln w3 shimmer"></div>
      <div style="height:10px"></div>
    </div>
    <div class="sk"><div class="ln w2 shimmer" style="margin-top:18px"></div><div class="ln w3 shimmer"></div><div style="height:10px"></div></div>
  </div>

  <!-- results -->
  <main id="result">
    <div class="sec-h">应该是这道菜~ 🍽️</div>
    <div class="hero">
      <img class="pic" id="hpic" src="" alt="">
      <div class="body">
        <div class="nm" id="hnm"></div>
        <div class="en" id="hen"></div>
        <div class="conf">
          <span class="stars"><span class="fill" id="hstars"></span></span>
          <span class="lab" id="hlab"></span>
        </div>
        <div class="intro" id="hintro"></div>
        <div class="alts" id="halts" style="display:none">
          <div class="h">也可能是 👇</div>
          <div id="hchips"></div>
        </div>
      </div>
    </div>

    <div class="sec-h">顺手收几个做法 📖</div>
    <div id="recipes"></div>
  </main>

  <div class="foot">嗨，这道菜 · 拍图认菜，做法随手收<br>认得不一定全对，当个有趣的参考就好 🙂</div>
</div>

function dishName(label){
  const d=DISH[label];
  const en=(label||"").replace(/_/g," ");
  if(d) return {zh:d[0], en, intro:d[1]};
  // 兜底：没收录就用美化后的英文
  const zh=en.replace(/\b\w/g,c=>c.toUpperCase());
  return {zh, en, intro:"看起来很好吃的一道菜～"};
}

/* 置信度 -> 星级(0~5) + 文案 */
function confInfo(c){
  let r,t;
  if(c>=0.85){r=5;t="基本就是它了";}
  else if(c>=0.65){r=4.5;t="很可能是这道";}
  else if(c>=0.45){r=4;t="应该是这道";}
  else if(c>=0.30){r=3.5;t="大概是这道";}
  else if(c>=0.18){r=3;t="有点拿不准，看看下面";}
  else {r=2.5;t="不太确定，参考其他猜测";}
  return {r,t};
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g,m=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}
const taoUrl=q=>"https://s.taobao.com/search?q="+encodeURIComponent(q);

/* ---------- 上传交互 ---------- */
const $=id=>document.getElementById(id);
const drop=$("drop"),fileInput=$("file"),preview=$("preview"),pimg=$("pimg");
let selectedFile=null,heroDataUrl="";

drop.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>{if(e.target.files[0])processFile(e.target.files[0]);});
$("reset").addEventListener("click",e=>{e.stopPropagation();clearAll();});

drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("drag");});
drop.addEventListener("dragleave",e=>{e.preventDefault();drop.classList.remove("drag");});
drop.addEventListener("drop",e=>{
  e.preventDefault();drop.classList.remove("drag");
  if(e.dataTransfer.files&&e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);
});
document.addEventListener("paste",e=>{
  const items=(e.clipboardData||{}).items||[];
  for(const it of items){if(it.type.indexOf("image")!==-1){const f=it.getAsFile();if(f){processFile(f);break;}}}
});

function processFile(file){
  if(!file.type.startsWith("image/")){alert("贴一张图片就行啦～");return;}
  selectedFile=file;
  const fr=new FileReader();
  fr.onload=e=>{
    heroDataUrl=e.target.result;
    pimg.src=heroDataUrl;
    preview.style.display="block";
    $("go").disabled=false;
    $("result").style.display="none";
    $("skel").style.display="none";
  };
  fr.readAsDataURL(file);
}
function clearAll(){
  selectedFile=null;heroDataUrl="";fileInput.value="";
  preview.style.display="none";$("go").disabled=true;
  $("result").style.display="none";$("skel").style.display="none";
}

/* ---------- 认菜 ---------- */
$("go").addEventListener("click",predict);
async function predict(){
  if(!selectedFile)return;
  const go=$("go");
  go.disabled=true;go.textContent="正在认… 🍳";
  $("result").style.display="none";
  $("skel").style.display="block";
  $("skel").scrollIntoView({behavior:"smooth",block:"start"});

  const fd=new FormData();fd.append("file",selectedFile);
  try{
    const res=await fetch("/predict",{method:"POST",body:fd});
    if(!res.ok)throw new Error("服务器开小差了 ("+res.status+")");
    const data=await res.json();
    render(data);
  }catch(err){
    alert("没认出来，再试一次吧～\n("+err.message+")");
    console.error(err);
  }finally{
    go.disabled=false;go.textContent="再认一张 👀";
    $("skel").style.display="none";
  }
}

let currentRecipes=[];
function render(data){
  // hero
  const info=dishName(data.prediction);
  $("hpic").src=heroDataUrl;
  $("hnm").textContent=info.zh;
  $("hen").textContent=info.en;
  $("hintro").textContent=info.intro;
  const ci=confInfo(data.confidence||0);
  $("hstars").style.width=(ci.r/5*100)+"%";
  $("hlab").textContent=ci.t;

  // 也可能是（top-5 去掉第一个）
  const alts=(data.top_5_predictions||[]).slice(1,5);
  const chips=$("hchips");chips.innerHTML="";
  if(alts.length){
    alts.forEach(a=>{
      const n=dishName(a.class);
      const sp=document.createElement("span");
      sp.className="chip";
      sp.textContent=n.zh;
      chips.appendChild(sp);
    });
    $("halts").style.display="block";
  }else{$("halts").style.display="none";}

  // recipes
  const box=$("recipes");box.innerHTML="";currentRecipes=[];
  const list=data.recipes||[];
  if(!list.length){
    box.innerHTML='<div class="empty">这道菜暂时没收录做法，下次补上～ 🙏</div>';
  }else{
    list.forEach((r,i)=>{
      let ing=r.ingredients,dir=r.directions;
      try{if(typeof ing==="string")ing=JSON.parse(ing);}catch(e){}
      try{if(typeof dir==="string")dir=JSON.parse(dir);}catch(e){}
      currentRecipes.push({title:r.title,ingredients:ing,directions:dir});
      box.appendChild(buildRecipeCard(r,ing,dir,i));
    });
  }

  $("result").style.display="block";
  $("result").scrollIntoView({behavior:"smooth",block:"start"});
}

function ingHtml(ing){
  if(Array.isArray(ing))
    return "<ul class='ing'>"+ing.map(x=>
      "<li><a class='tao' href='"+taoUrl(x)+"' target='_blank' rel='noopener' title='淘宝找食材'>🛒 "+esc(x)+"</a></li>").join("")+"</ul>";
  return "<p><a class='tao' href='"+taoUrl(ing)+"' target='_blank' rel='noopener'>🛒 "+esc(ing)+"</a></p>";
}
function dirHtml(dir){
  if(Array.isArray(dir))
    return "<ol class='dir'>"+dir.map(x=>"<li>"+esc(x)+"</li>").join("")+"</ol>";
  return "<p style='color:#6E5C50'>"+esc(dir)+"</p>";
}

function buildRecipeCard(r,ing,dir,i){
  const card=document.createElement("div");
  card.className="rcard";card.id="rc-"+i;
  const match=r.score!=null?(r.score>=0.7?"很搭":r.score>=0.5?"挺搭":"可以试"):"推荐";
  card.innerHTML=
    "<div class='rtop'>"+
      "<h3 class='rtitle' id='rt-"+i+"'>"+esc(r.title)+"</h3>"+
      "<span class='rmatch'>🔖 "+match+"</span>"+
    "</div>"+
    "<div class='rbar'>"+
      "<button class='link-btn' data-act='toggle'><span>看做法</span> <span class='ar'>▾</span></button>"+
      "<button class='link-btn cn-btn' data-act='cn'>🌐 看中文做法</button>"+
    "</div>"+
    "<div class='rbody' id='rb-"+i+"'>"+
      "<div class='blk-h'>🥕 用料 <span style='font-weight:400;color:var(--ink3);font-size:12px'>点食材可淘宝直达</span></div>"+
      "<div id='ing-"+i+"'>"+ingHtml(ing)+"</div>"+
      "<div class='blk-h'>🔥 步骤</div>"+
      "<div id='dir-"+i+"'>"+dirHtml(dir)+"</div>"+
    "</div>";
  card.querySelector("[data-act='toggle']").addEventListener("click",function(){toggleBody(i,this);});
  card.querySelector("[data-act='cn']").addEventListener("click",function(){translateRecipe(i,this);});
  return card;
}

function toggleBody(i,btn){
  const body=$("rb-"+i);const open=body.style.display==="block";
  body.style.display=open?"none":"block";
  btn.classList.toggle("open",!open);
  btn.querySelector("span").textContent=open?"看做法":"收起做法";
}

/* ---------- 翻译（保留百度接口，含限速）---------- */
const delay=ms=>new Promise(r=>setTimeout(r,ms));
async function callTranslate(text){
  if(!text||!String(text).trim())return text;
  const res=await fetch("/translate",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:String(text)})});
  if(!res.ok)throw new Error("translate "+res.status);
  const data=await res.json();
  if(data.trans_result&&data.trans_result.length)
    return data.trans_result.map(x=>x.dst).join("\n");
  return null;
}
async function translateRecipe(i,btn){
  const r=currentRecipes[i];if(!r)return;
  const old=btn.innerHTML;btn.disabled=true;btn.innerHTML="翻译中… ⏳";
  try{
    const t=await callTranslate(r.title);
    if(t)$("rt-"+i).textContent=t;
    await delay(1100);

    let ingTxt=Array.isArray(r.ingredients)?r.ingredients.join("\n"):r.ingredients;
    const ti=await callTranslate(ingTxt);
    if(ti){
      const arr=ti.split("\n").filter(s=>s.trim());
      $("ing-"+i).innerHTML=ingHtml(arr.length?arr:ingTxt);
    }
    await delay(1100);

    let dirTxt=Array.isArray(r.directions)?r.directions.join("\n"):r.directions;
    const td=await callTranslate(dirTxt);
    if(td){
      const arr=td.split("\n").filter(s=>s.trim());
      $("dir-"+i).innerHTML=dirHtml(arr.length?arr:dirTxt);
    }
    // 自动展开
    const body=$("rb-"+i);
    if(body.style.display!=="block"){
      const tg=$("rc-"+i).querySelector("[data-act='toggle']");
      toggleBody(i,tg);
    }
    btn.style.display="none";
  }catch(e){
    console.error(e);
    alert("翻译没成功，可能是太频繁了，过会儿再试～");
    btn.disabled=false;btn.innerHTML=old;
  }
}
</script>
